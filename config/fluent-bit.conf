[SERVICE]
    Daemon Off
    Flush 5
    Log_Level info
    Parsers_File parsers.conf
    Plugins_File plugins.conf

# Custom input plugin
#[INPUT]
#    Name sample_input
#    Tag sample.log
#    Interval_Sec 5

# Standard input for testing
[INPUT]
    Name cpu
    Tag metrics.cpu
    Interval_Sec 5

# Custom filter plugin
#[FILTER]
#    Name sample_filter
#    Match *
#    Operation modify

# Custom output plugin
#[OUTPUT]
#    Name sample_output
#    Match sample.log

# Standard output for testing
[OUTPUT]
    Name stdout
    Match *
